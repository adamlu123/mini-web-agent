# Vanilla RL on Qwen3.5-4B for the web-agent task.
#
# Mirrors `configs/qwen3_8b_rl.yaml` (the echo-rl GRPO baseline) but swaps:
# - dataset: web-agent (Online-Mind2Web tasks, parquet of task metadata)
# - generator: `echo_rl.web_agent.WebAgentGenerator` (drives Playwright)
# - reward: modular `osw_judge` calling o4-mini through the phyagi gateway
# - model: Qwen3.5-4B (https://huggingface.co/Qwen/Qwen3.5-4B) — 1 node, 8 GPUs
#
# Before launching:
#   1. Generate the parquets:
#        python -m echo_rl.web_agent.scripts.prepare_om2w_data \
#          --input  /home/luyadong/sandbox/nano_eval/task_files/om2w_260220.json \
#          --output ${ECHO_RL_DATA}/web_agent/om2w_train.parquet \
#          --val-output ${ECHO_RL_DATA}/web_agent/om2w_val.parquet \
#          --train-size 60 --val-size 8
#   2. Export gateway credentials:
#        export OPENAI_GATEWAY_API_KEY=...
#        export OPENAI_GATEWAY_ENDPOINT=http://gateway.phyagi.net/api/responses
#   3. Make sure Playwright is installed: `playwright install chromium`
#   4. Run via `scripts/run_web_agent.sh` (or set OUTPUT_DIR/CONFIG_PATH and call
#      the entrypoint that script wraps).

data:
  train_data:
    - name: web_agent_om2w_train
      path: ${oc.env:ECHO_RL_DATA,/mnt/pvc/datasets/web_agent}/om2w_train.parquet
  val_data:
    - name: web_agent_om2w_val
      path: ${oc.env:ECHO_RL_DATA,/mnt/pvc/datasets/web_agent}/om2w_val.parquet

tokenizer_path: Qwen/Qwen3.5-4B
chat_template_path: echo_rl/terminal_agent/chat_templates/qwen3_xml_tool_calling.jinja

trainer:
  placement:
    colocate_all: true
    colocate_policy_ref: true
    policy_num_nodes: 1
    policy_num_gpus_per_node: 8
    ref_num_nodes: 1
    ref_num_gpus_per_node: 8
  policy:
    model:
      path: Qwen/Qwen3.5-4B
    optimizer_config:
      lr: 1.0e-6
      adam_betas: [0.9, 0.999]
      weight_decay: 0.01
      max_grad_norm: 0.2
      scheduler: constant_with_warmup
      num_warmup_steps: 20
  algorithm:
    max_seq_len: 34096
    use_kl_loss: false
    use_kl_in_reward: false
    kl_loss_coef: 0.0
    eps_clip_low: 0.2
    eps_clip_high: 0.2
    advantage_batch_normalize: false
    loss_reduction: sequence_mean
    world_model_coeff: 0.0
    world_loss_normalization: full_observation_tokens
  epochs: 2
  update_epochs_per_batch: 1
  max_prompt_length: 1536
  train_batch_size: 16
  policy_mini_batch_size: 16
  micro_train_batch_size_per_gpu: 1
  micro_forward_batch_size_per_gpu: 1
  eval_batch_size: 16
  eval_before_train: false
  eval_interval: 20
  ckpt_interval: 20
  hf_save_interval: -1
  ckpt_path: ${oc.env:OUTPUT_DIR}/ckpts
  export_path: ${oc.env:OUTPUT_DIR}/exports
  log_path: ${oc.env:OUTPUT_DIR}/skyrl_logs
  logger: wandb
  project_name: world_model
  run_name: web_agent_qwen35_4b
  log_example_interval: -1

generator:
  n_samples_per_prompt: 16
  eval_n_samples_per_prompt: 8
  step_wise_trajectories: false
  parser_name: qwen35
  command_selection: first
  max_turns: 50
  history_window_turns: 10
  max_context_tokens: 16384
  max_tokens_per_generation: 2048
  max_terminal_output_chars: 50000
  terminal_output_truncation: start
  add_format_warn: true
  world_loss_target: env_only
  thinking_handling: keep_all
  verifier_timeout: 120.0
  length_penalty_coef: 0.0
  length_penalty_threshold: 20000
  correct_threshold: 0.5
  max_total_tokens: 34096
  # Harbor knobs are kept for compatibility with the shared base config schema.
  # They are unused by WebAgentGenerator but must remain typed correctly.
  docker_memory_mb: 1024
  docker_cpus: 1
  base_temp_dir: /tmp/web_agent
  agent_max_concurrency: 32
  agent_timeout: 1200.0
  max_concurrent_builds: 32
  max_build_retries: 3
  dataset_num_workers: 4
  dataset_max_rows: null

  # Web-agent specific knobs:
  reward:
    name: osw_judge
    judge_model: o4-mini
    judge_gateway_endpoint: http://gateway.phyagi.net/api/responses
    score_threshold: 3
    mini_web_agent_root: ${oc.env:MINI_WEB_AGENT_ROOT}
  env_overrides:
    headless: true
    nav_timeout_ms: 30000
    op_timeout_ms: 15000
    max_snapshot_chars: 6000
    workspace_root: /tmp/web_agent_rollouts
  stub_env: false

  sampling_params:
    max_generate_length: 2048
    temperature: 0.8
    logprobs: 0
  eval_sampling_params:
    max_generate_length: 2048
    temperature: 0.6
    logprobs: 0
  inference_engine:
    backend: vllm
    run_engines_locally: true
    num_engines: 8
    weight_sync_backend: nccl
    tensor_parallel_size: 1
    async_engine: true
    enforce_eager: false
    enable_prefix_caching: true
    enable_chunked_prefill: true
    gpu_memory_utilization: 0.8
    max_num_batched_tokens: 262144
    engine_init_kwargs:
      swap_space: 4
