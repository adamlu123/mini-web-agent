<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mini Web Agent Replays</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #5b6472;
      --line: #d7dce3;
      --line-strong: #b8c0cc;
      --accent: #245fce;
      --accent-soft: #e7eefc;
      --green: #0f766e;
      --amber: #b45309;
      --shadow: 0 12px 32px rgba(17, 24, 39, 0.08), 0 2px 8px rgba(17, 24, 39, 0.05);
      --radius: 8px;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0)),
        var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    iframe {
      font: inherit;
    }

    .shell {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      min-height: 100vh;
      padding: 16px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 360px) minmax(0, 1fr);
      gap: 16px;
      align-items: end;
    }

    .brand {
      min-width: 0;
    }

    .brand p {
      margin: 0 0 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 1px;
      overflow: hidden;
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--line);
      box-shadow: 0 1px 2px rgba(17, 24, 39, 0.04);
    }

    .tab {
      display: grid;
      gap: 3px;
      min-width: 0;
      min-height: 58px;
      padding: 9px 10px;
      border: 0;
      background: var(--panel);
      color: var(--ink);
      cursor: pointer;
      text-align: center;
    }

    .tab:last-child {
      border-right: 0;
    }

    .tab:hover {
      background: var(--accent-soft);
    }

    .tab:focus-visible {
      position: relative;
      z-index: 1;
      outline: 3px solid rgba(36, 95, 206, 0.28);
      outline-offset: -3px;
    }

    .tab[aria-selected="true"] {
      background: var(--ink);
      color: #ffffff;
    }

    .tab .kicker {
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.1;
      text-overflow: ellipsis;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .tab[aria-selected="true"] .kicker {
      color: rgba(255, 255, 255, 0.72);
    }

    .tab .name {
      overflow: hidden;
      font-size: 14px;
      font-weight: 750;
      line-height: 1.2;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display {
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
      min-height: 0;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .framebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-width: 0;
      padding: 0 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .frame-title {
      overflow: hidden;
      min-width: 0;
      font-size: 14px;
      font-weight: 750;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .frame-path {
      overflow: hidden;
      max-width: 42%;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .frame-wrap {
      min-height: 0;
      background: #ffffff;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 920px) {
      .shell {
        padding: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .tabs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .tab:nth-child(2),
      .tab:nth-child(-n + 2) {
        border: 0;
      }
    }

    @media (max-width: 620px) {
      .shell {
        grid-template-rows: auto minmax(560px, 1fr);
      }

      .tabs {
        grid-template-columns: 1fr;
      }

      .tab {
        min-height: 50px;
        border: 0;
      }

      .tab:last-child {
        border-bottom: 0;
      }

      .framebar {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        height: auto;
        min-height: 54px;
        padding-block: 8px;
      }

      .frame-path {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>Mini Web Agent Replays</h1>
      </div>

      <nav class="tabs" aria-label="Replay switcher">
        <button class="tab" type="button" data-demo="flight-with" aria-selected="true">
          <span class="kicker">Flights</span>
          <span class="name">With Skill</span>
        </button>
        <button class="tab" type="button" data-demo="flight-without" aria-selected="false">
          <span class="kicker">Flights</span>
          <span class="name">Without Skill</span>
        </button>
        <button class="tab" type="button" data-demo="ticket-with" aria-selected="false">
          <span class="kicker">Ticketmaster</span>
          <span class="name">With Skill</span>
          
        </button>
        <button class="tab" type="button" data-demo="ticket-without" aria-selected="false">
          <span class="kicker">Ticketmaster</span>
          <span class="name">Without Skill</span>
        </button>
        <button class="tab" type="button" data-demo="ipad-comparison" aria-selected="false">
          <span class="kicker">Apple</span>
          <span class="name">iPad Budget</span>
        </button>
        <button class="tab" type="button" data-demo="gift-trace" aria-selected="false">
          <span class="kicker">Trace</span>
          <span class="name">Gift Package</span>
        </button>
      </nav>
    </header>

    <section class="display" aria-label="Selected replay">
      <div class="framebar">
        <div class="frame-title" id="frameTitle">Flights with skill</div>
        <div class="frame-path" id="framePath">showcase/index_flight_with.html</div>
      </div>
      <div class="frame-wrap">
        <iframe
          id="demoFrame"
          title="Flights with skill"
          src="showcase/index_flight_with.html"
          loading="eager"
        ></iframe>
      </div>
    </section>
  </main>

  <script>
    const demos = {
      "flight-with": {
        title: "Flights with skill",
        src: "showcase/index_flight_with.html"
      },
      "flight-without": {
        title: "Flights without skill",
        src: "showcase/index_flight_without.html"
      },
      "ticket-with": {
        title: "Ticketmaster with skill",
        src: "showcase/index_ticket_with.html"
      },
      "ticket-without": {
        title: "Ticketmaster without skill",
        src: "showcase/index_ticket_without.html"
      },
      "ipad-comparison": {
        title: "Apple iPad budget comparison",
        src: "showcase/index_ipad_comparison.html"
      },
      "gift-trace": {
        title: "Gift package trace replay",
        src: "showcase/index_etsy_gift_trace.html"
      }
    };

    const tabs = Array.from(document.querySelectorAll(".tab"));
    const frame = document.querySelector("#demoFrame");
    const frameTitle = document.querySelector("#frameTitle");
    const framePath = document.querySelector("#framePath");

    function activateDemo(id, updateHash = true) {
      const demo = demos[id] || demos["flight-with"];
      const activeId = demos[id] ? id : "flight-with";

      tabs.forEach((tab) => {
        tab.setAttribute("aria-selected", String(tab.dataset.demo === activeId));
      });

      frame.src = demo.src;
      frame.title = demo.title;
      frameTitle.textContent = demo.title;
      framePath.textContent = demo.src;

      if (updateHash) {
        history.replaceState(null, "", `#${activeId}`);
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => activateDemo(tab.dataset.demo));
    });

    activateDemo(window.location.hash.slice(1), false);
  </script>
</body>
</html>
