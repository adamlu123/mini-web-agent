# Model modifier — OpenRouter chat completions variant.
#
# Stack on top of mini.yaml or local_browser.yaml:
#   python -m webwright.run.mini -c mini.yaml -c model_openrouter.yaml ...
#   python -m webwright.run.mini -c mini.yaml -c local_browser.yaml -c model_openrouter.yaml ...
#
# Required env: OPENROUTER_API_KEY.

model:
  model_class: openrouter
  model_name: openai/gpt-5.4
  openrouter_endpoint: https://openrouter.ai/api/v1/chat/completions
