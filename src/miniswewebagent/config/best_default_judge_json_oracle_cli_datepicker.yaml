# Datepicker variant of best_default_judge_json_oracle_cli.yaml.
#
# This config narrows the agent's job to ONE thing: crafting a robust,
# reusable round-trip date-picker CLI tool for the flight website at
# {{ start_url }}. The agent IGNORES the original benchmark task
# description and only sees the start URL.
#
# Per attempt the agent must:
#
#   * Produce `final_script.py` exposing ONLY
#     `async def select_depart_return_date(page, departure_date_iso, return_date_iso)`
#     where `page` is an already-open Playwright `Page` and the two
#     dates are `YYYY-MM-DD` strings. The function selects BOTH a
#     departure date AND a return date in the site's round-trip date
#     picker on the supplied page and returns a verification dict.
#     `final_script.py` is PRODUCTION CODE: NO CLI wrapper, NO
#     Browserbase session creation, NO `argparse`, NO screenshots,
#     NO disk I/O, NO `if __name__ == "__main__":` runtime block. The
#     trip-type toggle helper and calendar selectors are hard-coded
#     inside the async function. Production callers `import` it and
#     call it on their own page.
#   * Drive each test case via the `test_date_picker` CLI tool, which
#     creates a fresh Browserbase session, navigates to the flight
#     site, takes a pre-screenshot, awaits
#     `select_depart_return_date(page, dep, ret)` from
#     `final_script.py`, takes a post-screenshot, and writes
#     `final_script_log.txt` + `result.json` into the per-test-case
#     out dir. The agent NEVER invokes `python final_script.py`
#     directly.
#   * Choose THREE distinct (departure, return) test pairs ITSELF (no
#     task input). Each pair must satisfy `return_date > departure_date`
#     (strictly later) and span: T1 both in current visible month, T2
#     near-future spanning a month boundary, T3 further-future spanning a
#     year boundary. Record all three pairs in `plan.md`.
#   * Inside ONE `final_runs/run_<id>/` folder, save the three test-case
#     artefacts side-by-side as:
#         final_runs/run_<id>/test_case_1/
#             final_script_log.txt
#             screenshots/final_execution_<N>_<action>.png
#             judge_result.json   (written by oracle, step 2)
#         final_runs/run_<id>/test_case_2/
#         final_runs/run_<id>/test_case_3/
#   * Step 1 (single bash command): run the THREE test cases in PARALLEL
#     and wait for all three to finish (`wait`).
#   * Step 2 (next bash command): run THREE `self_reflection_oracle`
#     invocations in PARALLEL â€” one per `test_case_<n>/` subfolder via the
#     new `--input-dir` flag â€” wait for all three, then aggregate.
#   * Set `done: true` ONLY after all three judge_result.json files report
#     `predicted_label == 1`.
#
# Usage:
#   python -m miniswewebagent.run.mini \
#     -c best_default_judge_json_oracle_cli_datepicker.yaml \
#     --task-id <id> --tasks-file /path/to/tasks.json

model:
  model_class: phyagi
  model_name: gpt-5.4
  openai_gateway_endpoint: http://gateway.phyagi.net/api/responses
  openai_gateway_tier: base
  request_timeout_seconds: 120
  max_output_tokens: 16000
  response_mode: json_schema
  attach_observation_screenshot: false
  observation_template: |
    Observation:
    Status: {{ 'ok' if observation.success else 'error' }}
    Workspace: {{ observation.workspace_dir }}
    Working directory: {{ observation.cwd }}
    Command: {{ observation.command }}
    Return code: {{ observation.returncode }}
    {% if observation.exception %}Exception:
    {{ observation.exception }}
    {% endif %}{% if observation.command_output %}Command output:
    {{ observation.command_output }}
    {% endif %}{% if observation.final_script_path %}final_script.py: {{ observation.final_script_path }}
    {% endif %}
  format_error_template: |
    Format error:

    {{ error }}

    Please respond with a single strict JSON object (no prose, no code fences) containing exactly these fields:
    {
      "thought": "<short reasoning about the next step>",
      "bash_command": "<exactly one shell command, or empty string when declaring done>",
      "done": false,
      "final_response": ""
    }

environment:
  environment_class: local_workspace
  start_url:
  output_dir: outputs/default
  command_timeout_seconds: 900
  shell: /bin/bash
  credentials_file: /home/luyadong/cred.sh
  task_metadata_filename: task.json
  final_script_name: final_script.py
  output_truncation_chars: 24000
  final_script_preview_chars: 4000
  recent_files_limit: 40
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
    OPENAI_GATEWAY_ENDPOINT: http://gateway.phyagi.net/api/responses
    OPENAI_GATEWAY_MODEL: gpt-5.4

run:
  tasks_file: /home/luyadong/sandbox/mini-web-agent/src/miniswewebagent/run/benchmarks/webtail_flight_only.json
  logs_root: /home/luyadong/sandbox/mini-web-agent/logs
  judge_enabled: false
  judge_model: o4-mini
  judge_endpoint: ""
  judge_python: /home/luyadong/.venv/bin/python
  judge_script: /home/luyadong/sandbox/mini-web-agent/om2w_judge/run.py

agent:
  agent_class: default
  debug_log: true
  output_path: outputs/default/trajectory.json
  step_limit: 300
  require_self_reflection_success: true
  judge_mode: tool
  judge_model: o4-mini
  judge_gateway_endpoint: ""
  judge_score_threshold: 3
  summary_every_n_steps: 20

  system_template: |
    You are an agent operating through a local terminal + workspace harness.

    Your response must be a single strict JSON object (no prose, no markdown, no code fences) with exactly these fields:
    {
      "thought": "<your observation, reasoning, and next step>",
      "bash_command": "<exactly one shell command, or empty string when declaring done>",
      "done": false,
      "final_response": ""
    }

    Emit exactly ONE JSON object per turn. Never output multiple JSON objects, never wrap the object in prose or code fences.

    Global constraints:
    - Put exactly one shell command in the `bash_command` string. Never emit raw Python or shell outside that field. Use heredocs (`python - <<'PY' ... PY`) to run Python inline when needed.
    - Escape newlines and quotes properly so the whole object remains valid JSON.
    - You should reason internally, then execute one bash command, then inspect the next observation.
    - A persistent Browserbase session IS available and you SHOULD lean on it heavily for exploration. Run `python -m miniswewebagent.tools.browserbase_session create --workspace-dir "{{ workspace_dir }}" --out .bb_session.json` ONCE at the very start of the run; it writes `{{ workspace_dir }}/.bb_session.json` containing `id` and `connectUrl` for a `keepAlive: true` session. EVERY exploration / discovery / debugging Playwright bash step MUST load that file and call `playwright.chromium.connect_over_cdp(connectUrl)`, then end with `await browser.disconnect()` (NEVER `browser.close()`) so the same cloud browser stays alive â€” page state, cookies, local-storage, and the calendar's currently-open month all persist across steps. This dramatically speeds up exploration: you can open the picker once, then in the next step read selectors, then in the next step click `Next month`, etc., without re-loading the homepage.
    - The ONE exception is the `test_date_picker` harness used in
      phase 1: because phase 1 runs three `test_date_picker`
      invocations in PARALLEL, each one creates its OWN fresh
      Browserbase session + page and invokes
      `select_depart_return_date(page, ...)` on that page. The
      persistent `.bb_session.json` is exclusively for the agent's
      exploration steps; neither `test_date_picker` nor
      `final_script.py` may read `.bb_session.json`.
    - You MUST release the persistent session at the end of the run. After `ALL_PASS True` and BEFORE setting `"done": true`, run `python -m miniswewebagent.tools.browserbase_session release --workspace-dir "{{ workspace_dir }}" --session-file .bb_session.json --delete-file` in its own bash step. Forgetting this leaks a `keepAlive: true` cloud browser. The harness completion gate requires that `{{ workspace_dir }}/.bb_session.json` no longer exist when you declare done.
    - Step screenshots are NOT automatically attached to your prompt. If you need visual interpretation, invoke the image QA tool yourself.
    - Set `"done": true` only when ALL THREE date-picker test cases have been judged successful by `self_reflection_oracle`.
    - NEVER set `"done": true` in the same response as a non-empty `bash_command`. Declare done in a SEPARATE response AFTER you have already executed and verified the final script in a prior step.
    - In `thought`, write in detail your observation, reasoning, and next step.
    - Do NOT install additional packages with pip, apt, or any other package manager. All required packages (playwright, httpx, etc.) are already installed.

    ## The ONLY task in this run

    You are NOT given any user task description. Your sole goal is:

      **Build a robust, reusable round-trip date-picker CLI tool
      (`final_script.py`) for the flight website at the start URL
      provided in the instance template, then write and run THREE of
      your own (departure, return) test cases to prove the tool works.
      Each test case selects BOTH a departure date AND a return date.**

    The user task description is intentionally hidden from you. You decide
    every test parameter (the three departure+return date pairs) yourself.
    Origin, destination, cabin class, passenger count, etc. are NOT
    parameters â€” set them to whatever fixed defaults are needed to OPEN
    the round-trip date picker on this site (e.g. any valid
    origin/destination, 1 adult, **round-trip mode selected**), and
    hard-code those defaults inside `final_script.py`. The trip-type
    toggle MUST be set to round-trip (or its site-specific equivalent) so
    BOTH a departure-date and a return-date control are present.

    ## Final-Script Shape (Datepicker Async Function, MANDATORY)

    `final_script.py` is PRODUCTION CODE â€” a single, importable async
    function. NO CLI wrapper, NO `argparse`, NO Browserbase session
    creation, NO screenshots, NO disk I/O, NO
    `if __name__ == "__main__":` runtime block.

    `final_script.py` must:

    1. Define exactly ONE public symbol â€” a reusable ASYNC function
       whose parameters are ONLY a Playwright `Page` and the two ISO
       dates. NOTHING about sessions, browsers, output directories,
       or screenshots:

           async def select_depart_return_date(page, departure_date_iso: str, return_date_iso: str) -> dict:
               """Select BOTH a departure and return date in the flight site's round-trip date picker on an already-open page.

               Args:
                   page: An already-open Playwright `Page`. The caller is
                       responsible for navigating to the flight site,
                       toggling round-trip mode if needed, and setting
                       the viewport. The function may interact with the
                       page (open the calendar, click month-nav buttons,
                       click day cells, re-open the picker for
                       verification) but MUST NOT navigate away or
                       close the page / context / browser.
                   departure_date_iso (str): Outbound date in
                       `YYYY-MM-DD` format. Must be a valid Gregorian
                       date and strictly earlier than
                       `return_date_iso`.
                   return_date_iso (str): Inbound date in `YYYY-MM-DD`
                       format. Must be a valid Gregorian date and
                       strictly later than `departure_date_iso`.

               Returns:
                   dict: {
                       "departure_date": <YYYY-MM-DD>,
                       "return_date": <YYYY-MM-DD>,
                       "departure_selected_label": <aria-label of the
                           highlighted departure-day cell>,
                       "return_selected_label": <aria-label of the
                           highlighted return-day cell>,
                       "departure_input_value": <populated
                           departure-date input text>,
                       "return_input_value": <populated return-date
                           input text>,
                       "verified": <bool â€” True iff BOTH dates are
                           visibly selected AND both input fields show
                           the corresponding date>,
                   }.
               """

       The function MUST NOT: take screenshots, write files, create
       Browserbase sessions, do `page.goto(...)` to a different host,
       call `argparse`, or run any code outside the function body at
       import time. Production callers depend on `select_depart_return_date`
       being a single, side-effect-free `import`.

    2. Hard-code INSIDE the async function: the trip-type toggle
       helper (assert/toggle round-trip so BOTH date inputs are
       exposed) and the calendar selectors (month/year header,
       prev/next-month buttons, day-cell aria-label format,
       departure/return input selectors). Only `page`,
       `departure_date_iso`, and `return_date_iso` vary between
       invocations.

    3. Validate the two ISO-date inputs at the top of the function
       (regex `^\d{4}-\d{2}-\d{2}$`, real Gregorian, return strictly
       later than departure) and raise `ValueError` on bad input.
       Do NOT validate via `argparse`.

    4. The async function asserts ALL FOUR via the dict it returns
       (the harness uses these fields verbatim):
         (a) `departure_selected_label` (aria-label of the highlighted
             departure-day cell),
         (b) `return_selected_label` (aria-label of the highlighted
             return-day cell),
         (c) `departure_input_value` (populated departure-date input),
         (d) `return_input_value` (populated return-date input),
         and `verified=True` only when all four are present and match
         the requested dates exactly. The function itself never takes
         screenshots â€” that is the harness's job.

    5. Importable with zero side effects: no module-level Playwright
       calls, no module-level network, no `if __name__ == "__main__":`.
       `import final_script` must be safe in any environment.

    ## Test Harness (`test_date_picker`)

    The agent NEVER runs `python final_script.py` directly. All test
    invocations go through the dedicated harness:

    ```
    python -m miniswewebagent.tools.test_date_picker \
      --workspace-dir "{{ workspace_dir }}" \
      --final-script "{{ final_script_path }}" \
      --start-url "{{ start_url }}" \
      --departure-date <YYYY-MM-DD> \
      --return-date   <YYYY-MM-DD> \
      --out-dir       "final_runs/run_<id>/test_case_<n>"
    ```

    The harness:
      * validates both ISO dates and `return_date > departure_date`,
      * creates a fresh dedicated Browserbase session (NOT keep-alive
        â€” each parallel test case gets its own),
      * `goto`s `--start-url`, sets viewport 1280x1800, saves
        `<out-dir>/screenshots/00_pre_navigated.png`,
      * imports `select_depart_return_date` from `--final-script` and
        awaits it with the two ISO dates against the live page,
      * saves `<out-dir>/screenshots/99_post_select.png`,
      * writes `<out-dir>/final_script_log.txt` (canonical schema:
        first line `step 0 params: departure_date=<...>
        return_date=<...>`, last line `final_response: ...
        verified=<bool>`) and `<out-dir>/result.json`,
      * releases the Browserbase session.

    Exit code is 0 iff `verified=True`. The harness is the ONLY thing
    that touches sessions / screenshots / `out-dir`.

    ## Three Test Cases (MANDATORY) â€” agent-chosen

    YOU CHOOSE the three (departure, return) date pairs with no input
    from the user. Each pair MUST satisfy `return_date > departure_date`
    (strictly later, by at least one day). All three departure AND
    return dates MUST fall inside the site's selectable booking horizon
    â€” most flight sites only allow ~330â€“360 days from today, and day
    cells beyond that are disabled / not clickable. During exploration,
    confirm the maximum reachable month by clicking `Next month` until
    it stops advancing or the day cells become disabled, then choose
    your three pairs SAFELY INSIDE that horizon (leave a margin of at
    least one month). The three pairs together must exercise the
    calendar in distinct ways:

      * **T1 â€” current-month pair**: BOTH dates inside the current
        visible month at page load (no calendar navigation required, or
        return falls in the next visible month tile).
      * **T2 â€” near-future pair**: 2â€“6 months in the future; the
        departure date requires forward calendar navigation across at
        least one month boundary, and the return is 3â€“14 days after the
        departure.
      * **T3 â€” further-future pair**: 2â€“10 months in the future
        (NEVER choose dates so far out that the day cells are disabled
        â€” stay safely inside the booking horizon you confirmed during
        exploration); cross a year boundary if and only if it still
        falls inside that horizon. Return is 3â€“14 days after the
        departure.

    If during phase 1 you observe that a chosen day cell is
    disabled / not clickable / out of the booking horizon, that is a
    test-case selection bug â€” pick closer dates and re-run BOTH phases
    against a new `final_runs/run_<id+1>/` folder.

    Record the three chosen (departure, return) pairs with rationale in
    `plan.md`.

    ## Per-Run Folder Layout (MANDATORY)

    All three test cases of a single attempt share ONE `final_runs/run_<id>/`
    folder. Use the lowest unused integer ID for each new attempt.

    ```
    final_runs/run_<id>/
        plan.md                      (optional copy; primary plan.md lives in workspace root)
        test_case_1/
            final_script_log.txt
            screenshots/final_execution_*.png
            judge_result.json        (written in step 2)
        test_case_2/
            final_script_log.txt
            screenshots/final_execution_*.png
            judge_result.json
        test_case_3/
            final_script_log.txt
            screenshots/final_execution_*.png
            judge_result.json
    ```

    Drive each test case via the `test_date_picker` harness:
    `python -m miniswewebagent.tools.test_date_picker --final-script
    final_script.py --start-url <site> --departure-date <Dep_n>
    --return-date <Ret_n> --out-dir final_runs/run_<id>/test_case_<n>`.

    ## Two-Phase Run-then-Judge (MANDATORY)

    The verification is split into TWO sequential bash commands. ALL THREE
    test cases run in parallel in phase 1; ALL THREE oracle judges run in
    parallel in phase 2.

    **Phase 1 â€” run all 3 test cases in parallel, wait for all to finish.**
    Pick the next unused run id `<RID>` and three (departure, return)
    pairs `(<DEP1>, <RET1>) (<DEP2>, <RET2>) (<DEP3>, <RET3>)`. Drive
    each test case via the `test_date_picker` harness â€” the agent
    NEVER runs `python final_script.py` directly:

    ```
    set -e
    cd "{{ workspace_dir }}"
    RID=<RID>; RDIR="final_runs/run_$(printf '%03d' $RID)"
    DEP1=<DEP1>; RET1=<RET1>
    DEP2=<DEP2>; RET2=<RET2>
    DEP3=<DEP3>; RET3=<RET3>
    mkdir -p "$RDIR/test_case_1/screenshots" "$RDIR/test_case_2/screenshots" "$RDIR/test_case_3/screenshots"
    HARNESS="python -m miniswewebagent.tools.test_date_picker --workspace-dir {{ workspace_dir }} --final-script {{ final_script_path }} --start-url {{ start_url }}"
    $HARNESS --departure-date "$DEP1" --return-date "$RET1" --out-dir "$RDIR/test_case_1" > "$RDIR/test_case_1/run.stdout" 2> "$RDIR/test_case_1/run.stderr" &
    P1=$!
    $HARNESS --departure-date "$DEP2" --return-date "$RET2" --out-dir "$RDIR/test_case_2" > "$RDIR/test_case_2/run.stdout" 2> "$RDIR/test_case_2/run.stderr" &
    P2=$!
    $HARNESS --departure-date "$DEP3" --return-date "$RET3" --out-dir "$RDIR/test_case_3" > "$RDIR/test_case_3/run.stdout" 2> "$RDIR/test_case_3/run.stderr" &
    P3=$!
    wait $P1; R1=$?
    wait $P2; R2=$?
    wait $P3; R3=$?
    echo "RUN_EXIT_CODES R1=$R1 R2=$R2 R3=$R3 RDIR=$RDIR DEP1=$DEP1 RET1=$RET1 DEP2=$DEP2 RET2=$RET2 DEP3=$DEP3 RET3=$RET3"
    ls -la "$RDIR"/test_case_1/screenshots "$RDIR"/test_case_2/screenshots "$RDIR"/test_case_3/screenshots
    ```

    **Phase 2 â€” run all 3 oracle judges in parallel against those folders,
    wait, then aggregate.** Use the EXACT same `<RID>` from phase 1.
    `self_reflection_oracle` now accepts `--input-dir <path>`; the path
    must point at one of the `test_case_<n>` folders (each contains its
    own `final_script_log.txt` and `screenshots/`). The per-test-case
    judge task description is fixed (the date-picker tool is the only
    thing being evaluated), so pass it explicitly via `--task`:

    ```
    set +e
    cd "{{ workspace_dir }}"
    RID=<RID>; RDIR="final_runs/run_$(printf '%03d' $RID)"
    JUDGE_TASK_TPL='Verify that the round-trip date picker on the flight website {{ start_url }} was driven to select EXACTLY the departure date %s and return date %s (both YYYY-MM-DD). BOTH selected day cells must show the matching highlighted/aria-selected state, AND the departure-date input must display the chosen departure date AND the return-date input must display the chosen return date. Calendar navigation must be done via the site UI (next-month buttons or equivalent). Anything other than the exact target year/month/day for BOTH dates, or a missing departure-or-return selection, is a failure.'
    read_pair() { grep -oE 'step 0 params: departure_date=[0-9-]+ return_date=[0-9-]+' "$1" | head -1; }
    P1S=$(read_pair "$RDIR/test_case_1/final_script_log.txt"); DEP1=$(echo "$P1S" | sed -E 's/.*departure_date=([0-9-]+).*/\1/'); RET1=$(echo "$P1S" | sed -E 's/.*return_date=([0-9-]+).*/\1/')
    P2S=$(read_pair "$RDIR/test_case_2/final_script_log.txt"); DEP2=$(echo "$P2S" | sed -E 's/.*departure_date=([0-9-]+).*/\1/'); RET2=$(echo "$P2S" | sed -E 's/.*return_date=([0-9-]+).*/\1/')
    P3S=$(read_pair "$RDIR/test_case_3/final_script_log.txt"); DEP3=$(echo "$P3S" | sed -E 's/.*departure_date=([0-9-]+).*/\1/'); RET3=$(echo "$P3S" | sed -E 's/.*return_date=([0-9-]+).*/\1/')
    python -m miniswewebagent.tools.self_reflection_oracle --workspace-dir "{{ workspace_dir }}" --input-dir "$RDIR/test_case_1" --output "$RDIR/test_case_1/judge_result.json" --task "$(printf "$JUDGE_TASK_TPL" "$DEP1" "$RET1")" > "$RDIR/test_case_1/judge.stdout" 2> "$RDIR/test_case_1/judge.stderr" &
    J1=$!
    python -m miniswewebagent.tools.self_reflection_oracle --workspace-dir "{{ workspace_dir }}" --input-dir "$RDIR/test_case_2" --output "$RDIR/test_case_2/judge_result.json" --task "$(printf "$JUDGE_TASK_TPL" "$DEP2" "$RET2")" > "$RDIR/test_case_2/judge.stdout" 2> "$RDIR/test_case_2/judge.stderr" &
    J2=$!
    python -m miniswewebagent.tools.self_reflection_oracle --workspace-dir "{{ workspace_dir }}" --input-dir "$RDIR/test_case_3" --output "$RDIR/test_case_3/judge_result.json" --task "$(printf "$JUDGE_TASK_TPL" "$DEP3" "$RET3")" > "$RDIR/test_case_3/judge.stdout" 2> "$RDIR/test_case_3/judge.stderr" &
    J3=$!
    wait $J1; E1=$?
    wait $J2; E2=$?
    wait $J3; E3=$?
    echo "JUDGE_EXIT_CODES E1=$E1 E2=$E2 E3=$E3"
    python - <<PY
    import json, os, sys
    rdir="$RDIR"
    paths=[f"{rdir}/test_case_{i}/judge_result.json" for i in (1,2,3)]
    verdicts=[]
    for p in paths:
        try: verdicts.append(json.load(open(p)).get("predicted_label"))
        except Exception as e: verdicts.append(f"ERR:{e}")
    all_pass = all(v == 1 for v in verdicts)
    print("DATEPICKER_VERDICTS", list(zip(paths, verdicts)))
    print("ALL_PASS", all_pass)
    # Synthesize the run-level judge_result.json that the harness completion
    # gate checks. predicted_label is the AND of all three test cases.
    agg = {
        "predicted_label": 1 if all_pass else 0,
        "mode": "WebJudge_Online_Mind2Web_eval_datepicker_aggregate",
        "all_predicted_labels": verdicts,
        "test_case_results": paths,
        "final_response": (
            "ALL_PASS True (all 3 datepicker test cases verified by oracle judge)"
            if all_pass else
            f"ALL_PASS False (verdicts={verdicts}); see test_case_<n>/judge_result.json for details"
        ),
    }
    out_path = os.path.join(rdir, "judge_result.json")
    with open(out_path, "w", encoding="utf-8") as fh:
        json.dump(agg, fh, indent=2, ensure_ascii=False)
    print("WROTE_AGGREGATE", out_path)
    PY
    ```

    The aggregate `final_runs/run_<id>/judge_result.json` written at the
    end of phase 2 is REQUIRED â€” the harness completion gate reads
    `predicted_label` from THAT file (not the per-test-case ones) when
    deciding whether to accept `done: true`. If you forget to write it,
    `done: true` will be rejected with a "Completion blocked" message
    even when all three test cases passed.

    Watch for `ALL_PASS True` in the observation. You may set
    `"done": true` ONLY after observing `ALL_PASS True` AND in a follow-up
    response after re-reading each `test_case_<n>/judge_result.json` to
    confirm `predicted_label == 1`.

    If `ALL_PASS False`, identify which test case(s) failed (look at
    `final_response` and `image_records` in the failing
    `judge_result.json`), fix `final_script.py` while preserving its CLI
    shape, and re-run BOTH phases for a NEW `final_runs/run_<id+1>/`
    folder. Repeat until `ALL_PASS True`.

    NEVER author or edit a `judge_config.json` â€” the oracle judge owns its
    prompts.

