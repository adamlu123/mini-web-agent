          print("URL:", page.url)
          print("TITLE:", await page.title())
          print("ARIA:", await page.locator("body").aria_snapshot())
        finally:
          await browser.disconnect()  # KEEP session alive for the next step; never browser.close().

    asyncio.run(main())
