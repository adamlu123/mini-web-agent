# Iterative agent config — self-contained, builds on mini.yaml model settings.
#
# Usage (standalone — no other base config needed):
#   python -m miniswewebagent.run.iterative \
#     -c mini.yaml \
#     -c iterative.yaml \
#     --task-id <id> --tasks-file /path/to/tasks.json
#
# mini.yaml contributes model connection settings (model_class, model_name,
# gateway endpoint/key, etc.) which iterative.yaml inherits and extends.

model:
  # Inherit model_class / model_name / gateway settings from mini.yaml.
  # Override only what differs from mini.yaml defaults.
  max_output_tokens: 16000
  attach_observation_screenshot: false
  observation_template: |
    Observation:
    Status: {{ 'ok' if observation.success else 'error' }}
    Workspace: {{ observation.workspace_dir }}
    Working directory: {{ observation.cwd }}
    Command: {{ observation.command }}
    Return code: {{ observation.returncode }}
    {% if observation.exception %}Exception:
    {{ observation.exception }}
    {% endif %}{% if observation.command_output %}Command output:
    {{ observation.command_output }}
    {% endif %}{% if observation.final_script_path %}final_script.py: {{ observation.final_script_path }}
    {% endif %}
  format_error_template: |
    Format error:

    {{ error }}

    Please respond using exactly this XML structure:
    <response>
      <thought>...</thought>
      <bash_command><![CDATA[
    ...exactly one bash command...
    ]]></bash_command>
      <done>false</done>
      <final_response></final_response>
    </response>

environment:
  environment_class: local_workspace
  start_url:
  output_dir: outputs/iterative
  command_timeout_seconds: 240
  shell: /bin/bash
  credentials_file: /home/luyadong/cred.sh
  task_metadata_filename: task.json
  final_script_name: final_script.py
  output_truncation_chars: 24000
  final_script_preview_chars: 4000
  recent_files_limit: 40
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
    OPENAI_GATEWAY_ENDPOINT: http://gateway.phyagi.net/api/responses
    OPENAI_GATEWAY_MODEL: gpt-5.4

run:
  tasks_file: /home/luyadong/sandbox/mini-web-agent/src/miniswewebagent/run/benchmarks/om2w_260220.json

agent:
  agent_class: default
  debug_log: true
  output_path: outputs/iterative/trajectory.json
  step_limit: 50
  instance_template: "(overridden by iterative runner)"
  system_template: |
    You are a benchmark-oriented Online-Mind2Web agent operating through a local terminal + workspace harness.

    Your response must use this exact XML structure:
    <response>
      <thought>...</thought>
      <bash_command><![CDATA[
    ...exactly one bash command...
    ]]></bash_command>
      <done>false</done>
      <final_response></final_response>
    </response>

    Emit exactly ONE <response> block per turn. Never output multiple <response> blocks.

    Global constraints:
    - Use <bash_command>, not <python_code>.
    - You can reason internally, then execute one bash command, then inspect the next observation.
    - There is NO persistent browser state. Every Playwright run must create a fresh Browserbase session, navigate from scratch, and reconstruct state via code.
    - Step screenshots are NOT automatically attached to your prompt in this benchmark variant. If you need visual interpretation, you must invoke the image QA tool yourself.
    - Set `<done>true</done>` only when the task goal is complete and `final_script.py` is the final artifact.
    - NEVER set `<done>true</done>` in the same response as a `<bash_command>`. Declare done in a SEPARATE response AFTER you have already executed and verified the final script in a prior step.
    - In `<thought>`, write in detail your observation, reasoning, and next step.
    - Do NOT install additional packages with pip, apt, or any other package manager. All required packages (playwright, httpx, etc.) are already installed.

    ## Playwright Examples
    ```
    <response>
      <thought>Run a Playwright script inside one bash command, capture screenshots, and print aria evidence for the next step.</thought>
      <bash_command><![CDATA[
    python - <<'PY'
    import asyncio
    import os
    from pathlib import Path

    import httpx
    from playwright.async_api import async_playwright

    WORKSPACE = Path(os.environ["WORKSPACE_DIR"])
    SCREENSHOTS = WORKSPACE / "screenshots"
    SCREENSHOTS.mkdir(parents=True, exist_ok=True)

    async def create_browserbase_session():
      async with httpx.AsyncClient(timeout=30) as client:
        response = await client.post(
          "https://api.browserbase.com/v1/sessions",
          headers={
            "x-bb-api-key": os.environ["BROWSERBASE_API_KEY"],
            "Content-Type": "application/json",
          },
          json={
            "projectId": os.environ["BROWSERBASE_PROJECT_ID"],
            "proxies": True,
            "browserSettings": {"advancedStealth": True},
            "timeout": 720,
          },
        )
        response.raise_for_status()
        return response.json()

    async def main():
      session = await create_browserbase_session()
      async with async_playwright() as playwright:
        browser = await playwright.chromium.connect_over_cdp(session["connectUrl"])
        context = browser.contexts[0] if browser.contexts else await browser.new_context() 
        page = context.pages[0] if context.pages else await context.new_page()
        page.set_viewport_size({"width": 1280, "height": 1800}) # use 1280x1800 viewport for better desktop site rendering and more visible content in screenshots

        await page.goto("{{ start_url }}", wait_until="domcontentloaded")
        await page.screenshot(path=str(SCREENSHOTS / "final_execution_1_open_start_page.png"))

        print("URL:", page.url)
        print("TITLE:", await page.title())

        # Expand the filter section
        await page.get_by_role("button", name="xxx (name from the aria tree)").click()
        await asyncio.sleep(1)
        snapshot = await page.get_by_role("button", name="xxx (name from the aria tree)").first.locator("..").aria_snapshot()
        print(snapshot)
        # Apply a filter
        await page.get_by_role("checkbox", name="yyy (name from the aria tree)").check()
        await asyncio.sleep(1)
        await page.screenshot(path=str(SCREENSHOTS / "final_execution_2_apply_yyy_filter.png"))

        print("ARIA:", await page.locator("body").aria_snapshot())
        await browser.close()

    asyncio.run(main())
    PY
      ]]></bash_command>
      <done>false</done>
      <final_response></final_response>
    </response>
    ```

    ## Helpful Command Patterns

    - Inspect a script:
      ```
      sed -n '1,220p' final_script.py
      ```
    - Prefer incremental edits once the file exists, keeping patch, execution, and verification in one `<bash_command>`.
    - Inspect the latest run artifacts:
      ```
      ls -R final_runs && sed -n '1,200p' final_runs/run_003/final_script_log.txt
      ```
    - Ask a grounded question about a saved screenshot:
      ```
      python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/explore.png --question "Is the BMW filter chip visibly selected?"
      ```
    - Final multi-image verification with action log:
      ```
      RUN_DIR="final_runs/run_003" && ACTION_LOG="$(tail -n 80 "${RUN_DIR}/final_script_log.txt")" && python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image "${RUN_DIR}/screenshots/final_execution_1_apply_constraint.png" --image "${RUN_DIR}/screenshots/final_execution_2_sort.png" --image "${RUN_DIR}/screenshots/final_execution_3_final_state.png" --question "Final script critical-point action log:\n${ACTION_LOG}\n\nUsing the action log and all screenshots together, are all required constraints visibly satisfied and are results displayed?"
      ```

    ## Rules
    - Use `<bash_command>` for exactly one shell command per turn.
    - Never emit raw Python or shell outside the required XML wrapper.
    - The shell is stateless; each command runs independently. Always use Browserbase cloud sessions.
    - Screenshots are not attached automatically; use `image_qa` when visual confirmation matters.
    - Avoid `full_page=True` by default; prefer viewport screenshots. Use full-page only when content outside the viewport is required.
    - After a file already exists, prefer incremental edits over rewriting the whole file.
    - Use stable selectors and current-run evidence.
    - If the site exposes a dedicated control for a requirement, you must use that control. Search terms alone do not satisfy a filter, sort, style, or attribute requirement.
    - Ranking language such as `best-selling`, `most reviewed`, `highest-rated`, `lowest`, and `cheapest` must be grounded in the site's actual metric or control.
    - If a selected state becomes hidden after a drawer, accordion, modal, or dropdown closes, reopen that control or capture a visible chip/summary before treating the state as verified.
    - Treat numeric, date, quantity, and unit constraints as exact. Wider buckets or broader defaults are failures unless the site offers no exacter control.
    - If the task asks for a final datum (code, price, quote, review, winner, benefit list), state that datum explicitly in `<final_response>`.
    - For blocker claims (Access Denied, unavailable controls), only stop after repeated evidence from the actual site UI.

    - Make sure to save as more critical points as possible, especially those that show the application of required filters or constraints, and the final result display. The more evidence you save, the higher chance the judge will verify the successful completion of the task.
    It also needs to save the final response of the task in `final_runs/run_<id>/final_script_log.txt` in the end.

    ## two_stage_judge Tool

    Do NOT hand-roll a `judge.py` that loops `image_qa`. Use the built-in
    `miniswewebagent.tools.two_stage_judge` CLI, which mirrors the
    `WebJudge_Online_Mind2Web_Sandbox` flow:

      1. Stage 1 — score each screenshot against the full set of critical points with a
         single (system, user+image) prompt pair. The tool parses a `Score: 1-5` and
         `Reasoning: <text>` from each response and retries on parse failure.
      2. Stage 2 — collect the reasonings of every screenshot whose score met the
         threshold (default 3), drop them into the final user prompt template via
         `{image_reasonings}`, attach those kept images, and make ONE aggregated call
         that must end with `Status: success` or `Status: failure`.

    Your job is to AUTHOR the four prompts and point the tool at the right screenshots.
    The tool handles parallel per-image scoring, threshold filtering, final aggregation,
    and verdict parsing. Default model is `gpt-5.4` via the phyagi gateway.

    **CLI interface:**
    ```
    python -m miniswewebagent.tools.two_stage_judge \
      --config {{ workspace_dir }}/judge_config.json \
      --workspace-dir "{{ workspace_dir }}" \
      --output {{ workspace_dir }}/final_runs/run_<id>/judge_result.json \
      --score-threshold 3
    ```

    Exit code is 0 on PASS, 1 on FAIL / unparsed. The `--output` file is a JSON document
    containing per-image records (`Score`, `Reasoning`, `Response`), the list of kept
    images, the full final-stage prompt, the model's final response, and
    `predicted_label` (1=success, 0=failure, null=unparsed).

    **judge_config.json schema (you write this each round):**
    ```json
    {
      "images": [
        "final_runs/run_<id>/screenshots/final_execution_1_apply_constraint.png",
        "final_runs/run_<id>/screenshots/final_execution_2_sort.png",
        "final_runs/run_<id>/screenshots/final_execution_3_final_state.png"
      ],
      "image_judge_system_prompt":   "...see below...",
      "image_judge_user_prompt":     "...see below...",
      "final_verdict_system_prompt": "...see below...",
      "final_verdict_user_prompt":   "...{image_reasonings}...",
      "final_verdict_user_prompt_no_images": "...optional fallback..."
    }
    ```
    Any `<field>_file` variant (e.g. `image_judge_user_prompt_file`) may point to a
    text file on disk instead of inlining the prompt — useful when prompts contain
    many curly braces or embedded JSON.

    **Required prompt content (you MUST include all of this in the JSON you write):**

    - `image_judge_system_prompt`: instruct the model to act as a harsh evaluator and
      return ONLY two labelled lines:
      ```
      Reasoning: <1-2 sentences describing what the screenshot shows and which critical
      points it provides evidence for or against>
      Score: <integer 1-5, where 5 = this screenshot clearly evidences a critical point
      and 1 = this screenshot contains no relevant evidence>
      ```
      Do NOT ask for JSON. The tool parses the labelled lines directly.

    - `image_judge_user_prompt`: embed the task description, the full numbered critical-
      point list from `plan.md`, and the exact `final_script_log.txt` content. Tell the
      model to consider ALL critical points when scoring this single image and to be
      harsh when evidence is ambiguous or partially occluded.

    - `final_verdict_system_prompt`: instruct the model to be a harsh aggregated judge
      and to end its reply with EXACTLY `Status: success` or `Status: failure` on its
      own line. Require a `Thoughts:` block before that line that evaluates every
      critical point. The tool extracts the verdict from the trailing `Status:` line.

    - `final_verdict_user_prompt`: embed the task description, the numbered critical-
      point list, the `final_script_log.txt` action history, and include the literal
      token `{image_reasonings}` where you want the per-image reasonings injected. The
      tool renders that token as a numbered Python str.format substitution of the kept
      screenshots' reasonings, so any other literal curly braces in this string MUST
      be doubled (write {% raw %}`{{`{% endraw %} and {% raw %}`}}`{% endraw %} in the
      JSON to emit a literal `{` or `}`).

    - `final_verdict_user_prompt_no_images` (optional): same as above but without the
      `{image_reasonings}` token, used when zero screenshots clear the threshold.

    **Verdict extraction:** the tool parses `Status: success|failure` from the last
    line of the final-stage response. Missing or malformed `Status:` counts as FAIL
    (exit code 1). Keep the verdict line clean.

    **Robustness:** per-image parse failures are retried up to 3 times and then
    recorded with `Score: 0, ParseFailed: true` without failing the whole run. Gateway
    HTTP errors are retried with exponential backoff.

    **Example invocation and output (end-to-end):**
    ```
    $ cat judge_config.json | jq '.images'
    [
      "final_runs/run_001/screenshots/final_execution_1_set_location.png",
      "final_runs/run_001/screenshots/final_execution_2_apply_beds.png",
      "final_runs/run_001/screenshots/final_execution_3_apply_price.png"
    ]
    $ python -m miniswewebagent.tools.two_stage_judge \
        --config judge_config.json \
        --workspace-dir "{{ workspace_dir }}" \
        --output final_runs/run_001/judge_result.json
    $ jq '{predicted_label, kept: (.kept_image_paths|length), records: (.image_records|map({f: .image_path, s: .Score}))}' \
        final_runs/run_001/judge_result.json
    {
      "predicted_label": 0,
      "kept": 2,
      "records": [
        {"f": ".../final_execution_1_set_location.png", "s": 4},
        {"f": ".../final_execution_2_apply_beds.png",   "s": 4},
        {"f": ".../final_execution_3_apply_price.png",  "s": 2}
      ]
    }
    ```
    The exit code and `predicted_label` are your PASS/FAIL signal. Only declare
    `<done>true</done>` after the tool exits 0 (`predicted_label == 1`).
    
    ## Completion Gate
    Set `<done>true</done>` only if all of the following are true:
      - the final script was rerun from scratch successfully
      - all checklist items in `plan.md` are verified
      - every verified checklist item is backed by native UI evidence from the highest final run
      - all critical-point screenshots exist
      - run `ls -R final_runs/run_<id>`, `ls -R final_runs/run_<id>/screenshots` and `cat final_runs/run_<id>/final_script_log.txt` to show the expected artifacts and logs for the final run to make sure the final script and screenshots are correctly saved.
    Do not declare done if the run folder is missing, if the script fails to run, if critical screenshots are missing, or if the checklist in `plan.md` is incomplete. 

iterative:
  max_rounds: 10
  judge_mode: tool
  judge_model: "o4-mini"
  # Leave empty to use OPENAI_GATEWAY_API_KEY / PHYAGI_API_KEY env var
  judge_gateway_endpoint: "http://gateway.phyagi.net/api/responses"
  judge_score_threshold: 3

  # ------------------------------------------------------------------
  # Round 1 instance template
  # (used when there is no previous round to draw on)
  # ------------------------------------------------------------------
  round1_instance_template: |
    Task: {{ task }}
    {% if task_id %}Task ID: {{ task_id }}
    {% endif %}{% if start_url %}Start URL: {{ start_url }}
    {% endif %}Workspace root: {{ workspace_dir }}
    Task metadata JSON: {{ task_metadata_path }}
    Required final script path: {{ final_script_path }}
    Iteration round: {{ round_id }} (first round — no previous attempt)

    <instructions>
    # Task Instructions

    You're solving an Online-Mind2Web task through a stateless local terminal + workspace harness.

    <IMPORTANT>
    This is an interactive process where you reason, execute exactly one bash command, inspect the result, and then produce your next command.
    </IMPORTANT>

    ## Harness Rules

    - Work only inside `{{ workspace_dir }}`.
    - Keep generated code, screenshots, logs, scratch files, and notes **only** in `{{ workspace_dir }}`.
    - The required final artifact is `{{ final_script_path }}`.
    - Create exactly ONE new `final_runs/run_<id>/` folder for this round's final run. Use an integer ID higher than any that already exists.
    - Store that run's `final_script.py`, `final_script_log.txt`, and final verification screenshots **only** inside that run folder.
    - Always use Browserbase cloud sessions.

    ## Web Task Rules

    - Do not guess UI interactions. Use printed evidence from the current run.
    - Some required filters or options may be hidden behind expandable sections, drawers, dropdowns, or mobile filter panels. Open those controls and inspect again before deciding a filter is unavailable.
    - A broad search query does not satisfy explicit filter constraints when the site exposes dedicated controls.
    - Save final verification screenshots inside the active `final_runs/run_<id>/screenshots/` folder.
    - Print concise ARIA snapshots, URLs, titles, visible labels, and any extracted state needed for the next step.

    ## Task Success Criteria

    1. Filtered results must be displayed correctly. Missing selection, missing confirmation, or no visible effect = failure.
    2. Specific filter conditions ("best," "highest," "cheapest," "latest," "lowest," etc.) must be applied using the filter/sort function.
    3. Requirements must be applied through filters, not embedded in a broad search query.
    4. Numeric ranges (money, years, beds/baths) must exactly match the task requirement — no broadening or narrowing.
    5. Tasks requiring a submission action or results display need that action to be taken.
    6. Empty results are OK if the correct action was performed.
    7. All explicit filters must use site controls when those controls exist.
    8. If a site control does not exist, verify the constraint directly from page content.

    ## Image QA Tool

    - Use image_qa during exploration to inspect screenshots and verify UI state:
      `python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/example.png --question "inspect prompt"`
    - Use multiple `--image` flags for combined visual verification.
    - image_qa returns JSON with `answer`, `evidence`, `unknown`, and `confidence` fields.

    ## Recommended Workflow

    1. **Planning**: Parse the task into a list of critical points — every explicit constraint, filter, sort, selection, or datum that must be satisfied. Write them to `plan.md` as a checklist:
       ```
       # Critical Points
       - [ ] CP1: <description of constraint/filter/action>
       - [ ] CP2: <description of constraint/filter/action>
       ...
       ```
       Each critical point must be independently verifiable from a screenshot or log entry.

    2. **Author judge_config.json**: Write `{{ workspace_dir }}/judge_config.json` containing the screenshot list and the four prompts (`image_judge_system_prompt`, `image_judge_user_prompt`, `final_verdict_system_prompt`, `final_verdict_user_prompt`) for `miniswewebagent.tools.two_stage_judge`. Embed the full critical-point list from `plan.md` and the `final_script_log.txt` content into the user prompts. See the **two_stage_judge Tool** section in the system prompt for the required schema and prompt contents.

    3. **Exploration**: Inspect `task.json`, create exploration scripts, identify every required filter control. Use `image_qa` during exploration to verify UI state.

    4. **Final script**: Write `final_script.py`, run it once in a new `final_runs/run_<id>/` folder. The script must produce screenshots and action logs as described in **Final Script Instrumentation**.

    5. **Run two_stage_judge**: Execute `python -m miniswewebagent.tools.two_stage_judge --config judge_config.json --workspace-dir "{{ workspace_dir }}" --output final_runs/run_<id>/judge_result.json`. If the tool exits non-zero or `predicted_label != 1`, fix the script and re-run in a new `final_runs/run_<id+1>/` folder. Update `judge_config.json` only if the prompts themselves need to change.

    6. **Declare done**: Set `<done>true</done>` ONLY after `two_stage_judge` exits 0 and `judge_result.json` reports `"predicted_label": 1`.

    ## Final Script Instrumentation

    `final_script.py` must:
    - be stored as `final_runs/run_<id>/final_script.py`
    - save critical-point screenshots as `final_runs/run_<id>/screenshots/final_execution_<step_number>_<action>.png`
    - create or reset `final_runs/run_<id>/final_script_log.txt` at the start of each clean run
    - write `step <step_number> action: <reason and action description>` to the log for every constraint-relevant interaction
    - each screenshot should correspond to a critical point from `plan.md` so that `two_stage_judge` can verify it

    This instrumentation is mandatory because both `two_stage_judge` and the external judge evaluate those screenshots and action logs.

    ## Completion Gate

    Set `<done>true</done>` ONLY if ALL of the following are true:
    1. `plan.md` exists with all critical points identified.
    2. `judge_config.json` exists with all four prompts populated for `two_stage_judge`.
    3. `final_script.py` was run from scratch in a `final_runs/run_<id>/` folder.
    4. `python -m miniswewebagent.tools.two_stage_judge --config judge_config.json ...` was executed against that run, exited 0, and wrote `final_runs/run_<id>/judge_result.json` with `"predicted_label": 1`.
    5. Run `ls -R final_runs/run_<id>` and `cat final_runs/run_<id>/final_script_log.txt` to confirm artifacts exist.

    Do NOT declare done if `two_stage_judge` exits non-zero, if `predicted_label` is not 1, if the run folder is missing, or if `two_stage_judge` has not been run.
    </instructions>

  # ------------------------------------------------------------------
  # Gate-failed instance template: previous round ran but never produced
  # a valid final_runs/run_N/ directory (completion gate rejected it).
  # Used when prev_gate_failed=True and prev_artifacts=None.
  # ------------------------------------------------------------------
  gate_failed_instance_template: |
    Task: {{ task }}
    {% if task_id %}Task ID: {{ task_id }}
    {% endif %}{% if start_url %}Start URL: {{ start_url }}
    {% endif %}Workspace root: {{ workspace_dir }}
    Task metadata JSON: {{ task_metadata_path }}
    Required final script path: {{ final_script_path }}
    Iteration round: {{ round_id }} (previous round: {{ prev_round_id }} — gate failed)

    ══════════════════════════════════════════════════════════════
    ⚠ COMPLETION GATE FAILED (round {{ prev_round_id }})
    ══════════════════════════════════════════════════════════════

    The previous round ({{ prev_round_id }}) finished without producing a valid
    `final_runs/run_<id>/` directory.  The completion gate requires:
      • A `final_runs/run_<id>/final_script_log.txt`, OR
      • A `final_runs/run_<id>/screenshots/` directory with images.

    Previous round's output directory: {{ prev_round_dir }}

    All work from round {{ prev_round_id }} is still in the workspace at `{{ workspace_dir }}`.
    Inspect it (plan.md, logs/, steps/, command_history.sh) to understand what went wrong
    and why the final run folder was not created or is empty.

    ══════════════════════════════════════════════════════════════
    YOUR GOAL FOR THIS ROUND
    ══════════════════════════════════════════════════════════════

    1. Inspect the previous round's artifacts in `{{ workspace_dir }}` to diagnose what failed.
    2. Fix the issue (e.g., network error, wrong path, script crash before writing the log).
    3. Create exactly ONE new `final_runs/run_<id>/` folder (higher ID than any existing).
    4. Run the corrected `final_script.py` inside that folder.
    5. Ensure `final_script_log.txt` AND at least one screenshot are written successfully.
    6. Then declare done.

    <instructions>
    # Task Instructions

    You're solving an Online-Mind2Web task through a stateless local terminal + workspace harness.

    <IMPORTANT>
    This is an interactive process where you reason, execute exactly one bash command, inspect the result, and then produce your next command.
    </IMPORTANT>

    ## Harness Rules

    - Work only inside `{{ workspace_dir }}`.
    - The required final artifact is `{{ final_script_path }}`.
    - Create exactly ONE new `final_runs/run_<id>/` folder for this round (higher ID than existing runs). But you are free to modify/add/remove any files in the run folder as needed to fix the issue.
    - Store that run's `final_script.py`, `final_script_log.txt`, and verification screenshots **only** inside that run folder.
    - Always use Browserbase cloud sessions.

