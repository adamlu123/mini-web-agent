    ## Task Success Criteria

    1. Filtered results must be displayed correctly.
    2. Specific filter conditions must be applied using filter/sort controls.
    3. Numeric ranges must exactly match the task requirement.
    4. All explicit filters must use site controls when those controls exist.

    ## Final Script Instrumentation

    `final_script.py` must:
    - be stored as `final_runs/run_<id>/final_script.py`
    - save screenshots as `final_runs/run_<id>/screenshots/final_execution_<N>_<action>.png`
    - create `final_runs/run_<id>/final_script_log.txt` at startup and write `step <N> action: <desc>` for every interaction
    - copy itself to `{{ workspace_dir }}/final_script.py` at the end

