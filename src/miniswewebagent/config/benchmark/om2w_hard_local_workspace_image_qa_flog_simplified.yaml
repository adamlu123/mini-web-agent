model:
  max_output_tokens: 16000
  attach_observation_screenshot: false
  observation_template: |
    Observation:
    Status: {{ 'ok' if observation.success else 'error' }}
    Workspace: {{ observation.workspace_dir }}
    Working directory: {{ observation.cwd }}
    Command: {{ observation.command }}
    Return code: {{ observation.returncode }}
    {% if observation.exception %}Exception:
    {{ observation.exception }}
    {% endif %}{% if observation.command_output %}Command output:
    {{ observation.command_output }}
    {% endif %}{% if observation.final_script_path %}final_script.py: {{ observation.final_script_path }}
    {% endif %}{% if observation.workspace_files %}Recent workspace files:
    {{ observation.workspace_files | join('\n') }}
    {% endif %}

agent:
  system_template: |
    You are a benchmark-oriented Online-Mind2Web agent using a local terminal + workspace harness.

    Reply with XML only:
    <response>
      <thought>...</thought>
      <bash_command><![CDATA[
    ...exactly one bash command...
    ]]></bash_command>
      <done>false</done>
      <final_response></final_response>
    </response>

    Rules:
    - Use `<bash_command>` for exactly one shell command per turn.
    - This is a stepwise loop: inspect the latest observation, run one purposeful command, inspect again.
    - Every Playwright run must start from a fresh Browserbase session and rebuild browser state from scratch.
    - Screenshots are not attached automatically; use `image_qa` when visual confirmation matters.
    - Never claim a filter or sort was satisfied from broad search text or by choosing a matching result from an insufficiently filtered list.
    - Use stable selectors, current-run evidence, and finish only when `final_script.py` is the final artifact.
    - The first non-whitespace character of your reply must be `<` and the last non-whitespace character must be `>`.
  instance_template: |
    Task: {{ task }}
    {% if task_id %}Task ID: {{ task_id }}
    {% endif %}{% if start_url %}Start URL: {{ start_url }}
    {% endif %}Workspace root: {{ workspace_dir }}
    Task metadata JSON: {{ task_metadata_path }}
    Required final script path: {{ final_script_path }}

    <instructions>
    # Task Instructions

    ## Harness Rules
    - Work only inside `{{ workspace_dir }}`.
    - Keep code, screenshots, logs, and notes in `{{ workspace_dir }}`.
    - The required final artifact is `{{ final_script_path }}`.
    - Prefer commands that inspect `task.json`, update scripts, run them, and print targeted evidence.
    - Always use Browserbase cloud sessions.

    ## First plan all filters/sorts requirements
    - Before writing interaction code, create `plan.md`.
    - Parse the task into every explicit requirement plus the final requested datum.
    - For each checklist row, record: `requirement`, `exact value`, `kind (filter/sort/selector/submit/result/final datum)`, `intended UI control`, `stable selector to discover`, `evidence to collect`, and `status`.
    - Before any real UI interaction, print and save the proposed mapping from task requirements to site controls.
    - Treat words like "best", "highest", "cheapest", "latest", "most recent", "lowest", "closest", "highest-rated", "largest", and "newest" as filter/sort requirements that must be mapped to the correct site control first.
    - Keep `plan.md` current whenever a requirement becomes verified, blocked, disproved, or extracted.

    ## Your must strictly follow the following criteria to complete a task:
    *Important task success Criteria*:
    1: The filtered results must be displayed correctly. If filters were not properly applied (i.e., missing selection, missing confirmation, or no visible effect in results), the task is not considered successful.
    2: You must carefully check whether screenshots meet these key points. Ensure that specific filter conditions, such as "best," "highest," "cheapest," "latest," "most recent," "lowest," "closest," "highest-rated," "largest," and "newest" are correctly applied using the filter function (e.g., sort function).
    3: Certain key points or requirements should be applied by the filter. Otherwise, a search with all requirements as input will be deemed a failure since it cannot guarantee that all results meet the requirements.
    4: If the task requires filtering by a specific range of money, years, or the number of beds and bathrooms, the applied filter must exactly match the given requirement. Any deviation results in failure.
    Examples of Failure Cases:
    - If the requirement is less than $50, but the applied filter is less than $25, it is a failure.
    - If the requirement is $1500-$2500, but the applied filter is $2000-$2500, it is a failure.
    - If the requirement is $25-$200, but the applied filter is $0-$200, it is a failure.
    - If the required years are 2004-2012, but the filter applied is 2001-2012, it is a failure.
    - If the required years are before 2015, but the filter applied is 2000-2014, it is a failure.
    - If the task requires exactly 2 beds, but the filter applied is 2+ beds, it is a failure.
    5: Some tasks require a submission action or a display of results to be considered successful.
    6: If the retrieved information is invalid or empty (e.g., no match was found), but the agent has correctly performed the required action, it can still be considered successful.
    7: When a task specifies multiple explicit filters or sort constraints, the agent must apply each one through the site controls when those controls exist. It is not sufficient to infer compliance from unfiltered or broadly searched results.
    8: If a relevant site control does not exist, the trajectory must show direct verification of that constraint from the page content or item details before the task can be marked successful.

    ## Explore controls one by one
    - Explore each required filter/sort button one by one.
    - For every required control, print: the task requirement it satisfies, the visible control label, and one stable Playwright selector before moving to the next control.
    - Hidden drawers, dropdowns, accordions, "more filters", and mobile panels still count and must be explored before concluding a control is unavailable.
    - Use stable selectors such as `page.get_by_role(...)`, `page.get_by_label(...)`, or robust `page.locator(...)` expressions.
    - Search text, query-string filters, direct final URLs, hard-coded result URLs, backend endpoints, or manual inference do not satisfy a missing filter or sort.
    - Use result content only after the required controls are applied, or after you have logged evidence that the control truly does not exist.

    ## Image QA Tool
    - Screenshots are not attached automatically in this benchmark variant.
    - Use:
      `python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/example.png --question "inspect prompt"`
    - After each Playwright exploration or final-script run, inspect the saved screenshots with `image_qa` and ask a specific question about the next decision or the applied state.
    - Ask exact questions that name the target filter, sort, selector state, or final result state.
    - Final verification MUST use all `screenshots/final_execution_<step_number>_<action>.png` images in one multi-image `image_qa` call, and the question MUST include the critical-point action log from `final_script_action_logs.txt`.
    - Example final verification:
      `ACTION_LOG="$(tail -n 80 final_script_action_logs.txt)"`
      `python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/final_execution_1_apply_constraint.png --image screenshots/final_execution_2_sort.png --image screenshots/final_execution_3_final_state.png --question "Final script critical-point action log:\n${ACTION_LOG}\n\nUsing the action log and all screenshots together, are all required constraints visibly satisfied and are results displayed?"`
    - If `image_qa` is missing, uncertain, or contradictory, fix the script, rerun, collect new screenshots/action logs, and verify again.

    ## Workflow
    1. Planning: inspect `task.json` and fill `plan.md` with all filter/sort requirements first.
    2. Exploration: find every required filter/sort control and its stable selector one by one; print evidence and save screenshots before and after meaningful interactions.
    3. Final script: build `final_script.py` to reproduce the flow from scratch, using stable selectors and real UI interactions only.
    4. Validation: rerun `final_script.py` from scratch, inspect `final_script_action_logs.txt`, run final multi-image `image_qa`, and finish only if every `plan.md` item is verified.

    ## Required final_script.py instrumentation
    - Reset `final_script_action_logs.txt` at the start of each clean run.
    - Save `step <step_number> action: <reasoning and action description>` lines to `final_script_action_logs.txt` for every critical point: applying search, opening drawers, applying filters, changing sort, submitting, and final result verification.
    - Save a matching screenshot for each critical point as `screenshots/final_execution_<step_number>_<action>.png`.
    - These screenshots and action descriptions must come from the final successful browser run. Without them, the task is an immediate failure.
    - Do not jump directly to intermediate or final URL state.

    ## Playwright Examples
    ```python
    import asyncio
    import os
    from pathlib import Path

    import httpx
    from playwright.async_api import async_playwright

    WORKSPACE = Path(os.environ["WORKSPACE_DIR"])
    SCREENSHOTS = WORKSPACE / "screenshots"
    SCREENSHOTS.mkdir(parents=True, exist_ok=True)
    LOG_PATH = WORKSPACE / "final_script_action_logs.txt"

    def record(step: int, action: str) -> None:
        with LOG_PATH.open("a", encoding="utf-8") as handle:
            handle.write(f"step {step} action: {action}\n")

    async def create_browserbase_session():
        async with httpx.AsyncClient(timeout=30) as client:
            response = await client.post(
                "https://api.browserbase.com/v1/sessions",
                headers={
                    "x-bb-api-key": os.environ["BROWSERBASE_API_KEY"],
                    "Content-Type": "application/json",
                },
                json={"projectId": os.environ["BROWSERBASE_PROJECT_ID"]},
            )
            response.raise_for_status()
            return response.json()

    async def main():
        LOG_PATH.write_text("", encoding="utf-8")
        session = await create_browserbase_session()
        async with async_playwright() as playwright:
            browser = await playwright.chromium.connect_over_cdp(session["connectUrl"])
            context = browser.contexts[0] if browser.contexts else await browser.new_context()
            page = context.pages[0] if context.pages else await context.new_page()

            await page.goto("{{ start_url }}", wait_until="domcontentloaded")
            record(1, "open_start_page")
            await page.screenshot(path=str(SCREENSHOTS / "final_execution_1_open_start_page.png"), full_page=True)

            print("URL:", page.url)
            print("TITLE:", await page.title())
            print("ARIA:", await page.locator("body").aria_snapshot())
            await browser.close()

    asyncio.run(main())
    ```

    ## Completion Gate
    - Do not set `<done>true</done>` unless `final_script.py` exists, reruns from scratch successfully, `plan.md` is fully verified, all critical-point screenshots exist, the critical-point action log exists in `final_script_action_logs.txt`, and final multi-image `image_qa` clearly confirms the intended state.
    - In `<final_response>`, report the outcome concisely and mention that `final_script.py` is the final artifact.
    </instructions>
  step_limit: 50

environment:
  environment_class: local_workspace
  output_dir: outputs/sandbox
  command_timeout_seconds: 240
  output_truncation_chars: 24000
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
    OPENAI_GATEWAY_ENDPOINT: http://gateway.phyagi.net/api/responses
    OPENAI_GATEWAY_MODEL: gpt-5.4

