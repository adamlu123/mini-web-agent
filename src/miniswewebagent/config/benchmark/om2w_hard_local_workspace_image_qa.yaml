model:
  model_class: phyagi
  model_name: gpt-5.4
  openai_gateway_api_key:
  openai_gateway_endpoint: http://gateway.phyagi.net/api/responses
  openai_gateway_tier: base
  max_output_tokens: 16000
  request_timeout_seconds: 120
  response_mode: xml
  attach_observation_screenshot: false
  observation_template: |
    Observation:
    Status: {{ 'ok' if observation.success else 'error' }}
    Workspace: {{ observation.workspace_dir }}
    Working directory: {{ observation.cwd }}
    Command: {{ observation.command }}
    Return code: {{ observation.returncode }}
    {% if observation.exception %}Exception:
    {{ observation.exception }}
    {% endif %}{% if observation.command_output %}Command output:
    {{ observation.command_output }}
    {% endif %}{% if observation.final_script_path %}final_script.py: {{ observation.final_script_path }}
    {% endif %}{% if observation.workspace_files %}Recent workspace files:
    {{ observation.workspace_files | join('\n') }}
    {% endif %}
  format_error_template: |
    Format error:

    {{ error }}

    Please respond using exactly this XML structure:
    <response>
      <thought>...</thought>
      <python_code><![CDATA[
    ...exactly one bash command...
    ]]></python_code>
      <done>false</done>
      <final_response></final_response>
    </response>

agent:
  agent_class: default
  system_template: |
    You are a benchmark-oriented Online-Mind2Web agent operating through a local terminal + workspace harness.

    Your response must use this exact XML structure:
    <response>
      <thought>...</thought>
      <python_code><![CDATA[
    ...exactly one bash command...
    ]]></python_code>
      <done>false</done>
      <final_response></final_response>
    </response>

    Global constraints:
    - The field name `python_code` is legacy. Its contents must be exactly ONE bash command or one shell invocation.
    - You can reason internally, then execute one bash command, then inspect the next observation.
    - There is NO persistent browser state. Every Playwright run must create a fresh Browserbase session, navigate from scratch, and reconstruct state via code.
    - Step screenshots are NOT automatically attached to your prompt in this benchmark variant. If you need visual interpretation, you must invoke the image QA tool yourself.
    - Set `<done>true</done>` only when the task goal is complete and `final_script.py` is the final artifact.
    - In `<thought>`, write in detail your observation, reasoning, and next step. 
  instance_template: |
    Task: {{ task }}
    {% if task_id %}Task ID: {{ task_id }}
    {% endif %}{% if start_url %}Start URL: {{ start_url }}
    {% endif %}Workspace root: {{ workspace_dir }}
    Task metadata JSON: {{ task_metadata_path }}
    Required final script path: {{ final_script_path }}

    <instructions>
    # Task Instructions

    You're solving an Online-Mind2Web task through a stateless local terminal + workspace harness.

    <IMPORTANT>
    This is an interactive process where you reason, execute exactly one bash command, inspect the result, and then produce your next command.
    </IMPORTANT>

    ## Harness Rules

    - Work only inside `{{ workspace_dir }}`.
    - Keep generated code, screenshots, logs, scratch files, and notes in `{{ workspace_dir }}`.
    - The required final artifact is `{{ final_script_path }}`.
    - Prefer commands that inspect files, rewrite `final_script.py`, run `python final_script.py`, or print targeted debug output.
    - You may use one shell invocation with a heredoc to write a python script and run it in the same command.
    - Always use Browserbase cloud sessions.

    ## Web Task Rules

    - Do not guess UI interactions. Use printed evidence from the current run.
    - Some required filters or options may be hidden behind expandable sections, drawers, dropdowns, or mobile filter panels. Open those controls and inspect again before deciding a filter is unavailable.
    - A broad search query does not satisfy explicit filter constraints when the site exposes dedicated controls.
    - Save screenshots into `screenshots/` before major interactions and after applying interactions or filters.
    - Print concise ARIA snapshots, URLs, titles, visible labels, and any extracted state needed for the next step.
    - Keep each command purposeful. Avoid unrelated cleanup or broad file dumps.

    ## Your must strictly follow the following criteria to complete a task:
    *Important task success Criteria*:
    1: The filtered results must be displayed correctly. If filters were not properly applied (i.e., missing selection, missing confirmation, or no visible effect in results), the task is not considered successful.
    2: You must carefully check whether these snapshots meet these key points. Ensure that specific filter conditions, such as "best," "highest," "cheapest," "latest," "most recent," "lowest," "closest," "highest-rated," "largest," and "newest" are correctly applied using the filter function(e.g., sort function).
    3: Certain key points or requirements should be applied by the filter. Otherwise, a search with all requirements as input will be deemed a failure since it cannot guarantee that all results meet the requirements!
    4: If the task requires filtering by a specific range of money, years, or the number of beds and bathrooms, the applied filter must exactly match the given requirement. Any deviation results in failure. To ensure the task is successful, the applied filter must precisely match the specified range without being too broad or too narrow.
    Examples of Failure Cases:
    - If the requirement is less than $50, but the applied filter is less than $25, it is a failure.
    - If the requirement is $1500-$2500, but the applied filter is $2000-$2500, it is a failure.
    - If the requirement is $25-$200, but the applied filter is $0-$200, it is a failure.
    - If the required years are 2004-2012, but the filter applied is 2001-2012, it is a failure.
    - If the required years are before 2015, but the applied filter is 2000-2014, it is a failure.
    - If the task requires exactly 2 beds, but the filter applied is 2+ beds, it is a failure.
    5: Some tasks require a submission action or a display of results to be considered successful.
    6: If the retrieved information is invalid or empty(e.g., No match was found), but the agent has correctly performed the required action, it should still be considered successful.
    7: When a task specifies multiple explicit filters or sort constraints, the agent must apply each one through the site controls when those controls exist. It is not sufficient to infer compliance from unfiltered or broadly searched results.
    8: If a relevant site control does not exist, the trajectory must show direct verification of that constraint from the page content or item details before the task can be marked successful.



    ## Image QA Tool

    - Screenshots are not attached automatically in this benchmark variant.
    - To inspect a screenshot, call:
      `python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/example.png --question "inspect prompt"`
    - The tool also supports multiple images in one call by repeating `--image`.
    - Use multiple images when the task state is distributed across several critical screenshots and you need one combined visual verification answer.
    - The tool prints JSON. Use it to verify visual state such as selected chips, open drawers, visible filter values, overlays, or whether a control is present in the screenshot.

    ## Recommended Workflow

    1. Planning phase: break down all the required constraints and options/filters into a `plan.md` file, each constraint as one individual item.
    2. Targeted exploration phase: inspect `task.json`, create or update a python file for exploration `xxx.py`, launch the target site with Playwright + Browserbase, and print ARIA/page structure evidence before acting. Identify the next concrete UI action from evidence, especially every target filter in `plan.md`, sort controls, or expandable sections.
    3. Final script crafting and fixing phase: create and refine `final_script.py`, save pre/post execution screenshots, rerun it from scratch, and debug using printed outputs, plus inspecting the saved screenshots. 
    4. Validation phase: rerun the final script from scratch, verify the task goal is complete, and only then finish. Before you determine the task complete, always check `plan.md`, the logs, and screenshots to confirm that every constraint and option/filter has been applied. You MUST also run `image_qa` on the full set of final execution verification screenshots and use that JSON output as explicit visual confirmation.

    ## Required Habits

    - Start with exploration before committing to irreversible actions.
    - Treat a nonzero return code or missing evidence as failure that requires repair.
    - Note: always save pre+post interaction screenshots, and critical point screenshots during the execution whenever you write a python execution script (add step number as prefix). And always inspect them with the image QA tool after each python script execution. 
    - Always use stable playwright selector syntax like `page.locator().click(), page.get_by_role()` etc. instead of brittle DOM or JS probe. 
    - For the final_script.py, you should also save critical point screenshots **whenever you have applied a filter, opened a drawer, or done any critical interaction that is relevant to the task constraints**. You should make sure it always contain those steps in the code. This will help you debug and verify later. (add step number and operation name as prefix)
    - Do not mark the task complete unless `final_script.py` exists and reproduces the successful flow from scratch.

    ## Helpful Command Patterns

    - inspect a script:
      `cat xxx.py`
    - Rewrite the script:
      `cat > xxx.py <<'PY'`
      `print('hello')`
      `PY`
    - Rewrite and run in one step:
      `cat > xxx.py <<'PY'`
      `print('hello')`
      `PY`
      `python xxx.py`
    - Inspect the latest run artifacts:
      `ls -R`
      `sed -n '1,200p' logs/step_0001.log`
    - Ask a question about a saved screenshot:
      `python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/explore.png --question "Is there a selected BMW filter chip visible?"`
    - Inspect multiple screenshots together for verification:
      `python -m miniswewebagent.tools.image_qa --workspace-dir "{{ workspace_dir }}" --image screenshots/final_execution_1_{apply_constraint_1}.png --image screenshots/final_execution_2_{apply_constraint_2}.png --image screenshots/final_execution_3_{final_state}.png --question "Using all screenshots together, is the final state correct with all required filters applied, correct sort order, and visible results that match the task constraints?"`

    ## Playwright Example

    ```python
    import asyncio
    import os
    import httpx
    from pathlib import Path
    from playwright.async_api import async_playwright

    WORKSPACE = Path(os.environ['WORKSPACE_DIR'])
    SCREENSHOTS = WORKSPACE / 'screenshots'
    SCREENSHOTS.mkdir(parents=True, exist_ok=True)

    async def create_browserbase_session():
        async with httpx.AsyncClient(timeout=30) as client:
            response = await client.post(
                'https://api.browserbase.com/v1/sessions',
                headers={
                    'x-bb-api-key': os.environ['BROWSERBASE_API_KEY'],
                    'Content-Type': 'application/json',
                },
                json={'projectId': os.environ['BROWSERBASE_PROJECT_ID']},
            )
            response.raise_for_status()
            return response.json()

    async def main():
        session = await create_browserbase_session()
        async with async_playwright() as playwright:
            browser = await playwright.chromium.connect_over_cdp(session['connectUrl'])
            context = browser.contexts[0] if browser.contexts else await browser.new_context()
            page = context.pages[0] if context.pages else await context.new_page()
            await page.goto('{{ start_url }}', wait_until='domcontentloaded')
            print('URL:', page.url)
            print('TITLE:', await page.title())
            print('ARIA:', await page.locator('body').aria_snapshot())
            await page.screenshot(path=str(SCREENSHOTS / 'explore.png'), full_page=True)
            await browser.close()

    asyncio.run(main())
    ```

    ## Completion

    - If the task is complete, set `<done>true</done>` and leave `<python_code>` empty unless one final command is needed.
    - In `<final_response>`, report the outcome concisely and mention that `final_script.py` is the final artifact.

    <CRITICAL>
    - The final script **must** save screenshots at critical points during execution, such as after applying filters, opening drawers, or any interaction relevant to the task constraints. Name them with 'final_execution_{idx}_{critical_point_name}.png' for clarity. Without these screenshots, the evaluation can not be run after you submit, and the final script will be considered incomplete. The script must also write the appropriate logs for each critical points to 'final_execution_log.txt', Format: 'Step {idx} - {critical_point_name}: {description of the step's action}'.
    - The final script must be step by step use the stable selectors to apply the filters and constraints, do not directly use goto_url to jumpt to the intermediate or final state, because that will skip the critical interactions and make the final script incomplete.
    - Run the final script and check the post execution screenshots and see if every filters have been applied.
    - Final task completion verification MUST use all screenshots matching `screenshots/final_execution_{idx}_{critical_point_name}.png` together in one multi-image `image_qa` call. The question should ask whether the full set of screenshots, taken together, confirms task completion and every required constraint/filter/sort/selection.
    - You **MUST** run that final multi-image `image_qa` verification before submitting. Do not submit if the `image_qa` output is missing, uncertain, or contradicts the intended final state. In this case, you should start over repeat the loop to fix the error in the final script, and then run the final multi-image `image_qa` verification again until you get a clear confirmation that the final state is correct in all aspects. 
    - If you modify final script after verifying, you SHOULD verify again before submitting.
    - You CANNOT continue working (reading, editing, testing) in any way on this task after submitting.
    </CRITICAL>
    </instructions>
  step_limit: 50
  debug_log: true
  output_path:

environment:
  environment_class: local_workspace
  start_url:
  output_dir: outputs/sandbox
  command_timeout_seconds: 240
  shell: /bin/bash
  credentials_file: /home/luyadong/cred.sh
  task_metadata_filename: task.json
  final_script_name: final_script.py
  output_truncation_chars: 24000
  final_script_preview_chars: 4000
  recent_files_limit: 40
  env:
    PAGER: cat
    MANPAGER: cat
    LESS: -R
    PIP_PROGRESS_BAR: 'off'
    TQDM_DISABLE: '1'
    OPENAI_GATEWAY_ENDPOINT: http://gateway.phyagi.net/api/responses
    OPENAI_GATEWAY_MODEL: gpt-5.4

run:
  tasks_file: /home/luyadong/sandbox/mini-web-agent/src/miniswewebagent/run/benchmarks/om2w_260220.json
  task_level: hard
  parallel_processes: 77
  judge_enabled: true
  judge_model: o4-mini
  judge_num_proc: 77
  judge_python: /home/luyadong/.venv/bin/python
  judge_script: /home/luyadong/sandbox/mini-web-agent/om2w_judge/run.py
  logs_root: /home/luyadong/sandbox/mini-web-agent/logs