model:
  response_mode: xml
  observation_template: |
    Observation:
    Status: {{ 'ok' if observation.success else 'error' }}
    URL: {{ observation.url }}
    Title: {{ observation.title }}
    {% if observation.exception %}Exception:
    {{ observation.exception }}
    {% endif %}{% if observation.python_code %}Python code:
    {{ observation.python_code }}
    {% endif %}{% if observation.console_output %}Console output:
    {{ observation.console_output }}
    {% endif %}{% if observation.aria_snapshot %}ARIA snapshot:
    {{ observation.aria_snapshot }}
    {% endif %}{% if observation.screenshot_path %}Screenshot path: {{ observation.screenshot_path }}
    {% endif %}

agent:
  system_template: |
    You are a minimal web agent operating a live async Playwright browser session.

    Your response must use this exact XML structure:
    <response>
      <thought>...</thought>
      <python_code><![CDATA[
    ...python code for exactly one NEW step...
    ]]></python_code>
      <done>false</done>
      <final_response></final_response>
    </response>

    Constraints:
    - Write async Python code that can run directly with page, context, browser, playwright, and asyncio already available.
    - Do not use full DOM extraction.
    - Use the provided ARIA snapshot, screenshot, console output, and previous history.
    - Keep each step small and concrete.
    - Set <done>true</done> only when you have actually answered the user's task, not when you have merely opened a page or partially progressed.
    - If the latest observation has Status: error, treat it as a failed step and propose a recovery step instead of ending the task.
    - If the task is complete, set <done>true</done> and leave <python_code> empty unless one final browser action is required.
    - For Online-Mind2Web tasks, treat every explicit task constraint as required. Do not leave any constraint unresolved.
    - If the task mentions filters, sorting, ranges, ratings, colors, sizes, materials, years, mileage, amenities, locations, or counts, you must apply each corresponding on-page filter or sort control explicitly, one at a time, whenever the site provides one.
    - A broad search query does not count as applying those filters. Do not conclude from search results alone when the site exposes separate controls.
    - After each filter or sort action, wait for the page to update and verify that the visible results reflect that specific constraint before moving on.
    - If a required filter control is not available on the site, verify that constraint directly from the visible page content or item details before proceeding, and do not claim success unless every constraint has been explicitly applied or directly verified.
    - Never mark the task complete while any explicit filter or sort requirement from the task has not yet been applied or verified.
    - In <thought>, state the next unresolved constraint you are handling, or the specific recovery step after a failure.
    - First, make a plan by parsing the user task into exact constraints/requirements/filters to apply one by one, and create `plan.md`. It should contain a todo checklist, with all items unchecked in the beginning. Make sure to print it out at the end of each step, with the current item being handled marked as "in progress" and all completed items checked. 
    - In your thoughts, if a relevant control truly does not exist, you may verify that constraint from page content only after you have logged explicit evidence that the control was searched for and is unavailable, log it in the thoughts. 


    ## Task Success Rules
    Treat the task as successful only if all applicable checks pass:
    - Required filters or sorts are visibly applied, confirmed, and have an observable effect or exact final state.
    - Terms like "best", "highest", "cheapest", "latest", "most recent", "lowest", "closest", "highest-rated", "largest", and "newest" must be implemented through the relevant sort or filter control when such a control exists.
    - Treat every explicit requirement in the task as a required UI operation.
    - Searching with all requirements as free text does not count when the site offers corresponding filters, sorts, selectors, or toggles.
    - Selecting a result that appears to meet the task from an unfiltered or broadly filtered result list does not count as satisfying the missing requirements.
    - Ranges for price, year, beds, bathrooms, and similar numeric constraints must match exactly. Too broad or too narrow is failure.
    - If the task requires exactly `2 beds`, then `2+ beds` is failure.
    - If the task requires a submission action or results view, the trajectory must include it.
    - If no matching result exists, the task can still succeed if the required actions were correctly performed and the page clearly shows that outcome.
    - When multiple explicit constraints exist, each one must be applied through site controls when those controls exist. Even one missing, inaccurate, or unconfirmed filter or sort makes the whole task a failure.
    - If a relevant control truly does not exist, you may verify that constraint from page content only after you have logged explicit evidence that the control was searched for and is unavailable.
    - If a relevant control exists, query-string filters, keyword-only search text, hard-coded item URLs, backend API calls, custom HTML summaries, or manual inference do not satisfy that constraint.
    - Use result content or item-detail inspection to extract the final requested answer only after the required filtering and sorting operations are already verified.
    - You must first reason about what the script is doing, and steps taken, is there any missing filters/requirements from the script. Use the stable selectors from the script as a reference but not a ground truth. Always verify against the live page and follow the constraints and success rules above. Do this in <thought> reason about the final_script. </thought>

    <critical> Always follow the constraints and success rules above exactly. Do not skip any of them, and do not make up your own rules. Only set <done>true</done> when all rules are satisfied. 
    </critical>
  instance_template: |
    Task: {{ task }}
    {% if task_id %}Task ID: {{ task_id }}
    {% endif %}
    {% if start_url %}Start URL: {{ start_url }}
    {% endif %}
    Use the live browser session to complete the task.
    {% if final_script %}
    ## Reference Script from a Previous Run
    Below is a final_script.py from a prior exploratory run of this exact task.
    Read it carefully to understand the overall flow, page structure, selectors, and sequence of actions.
    Use it as a guide, but verify every step against the live page — selectors or layout may have changed.
    Do NOT blindly replay it. Adapt as needed.
    You must first reason about what the script is doing, and steps taken, is there any missing filters/requirements from the script. Use the stable selectors from the script as a reference but not a ground truth. Always verify against the live page and follow the constraints and success rules above. Do this in <thought> reason about the final_script. </thought>

    ```python
    {{ final_script }}
    ```
    {% endif %}
  step_limit: 50
environment:
  browserbase_enabled: true
  headless: true
  slow_mo_ms: 0
  browser_timeout_ms: 12000
  browser_navigation_timeout_ms: 45000
  observation_timeout_ms: 6000
run:
  tasks_file: /home/luyadong/sandbox/mini-web-agent/src/miniswewebagent/tasks/om2w_260220.json
  task_level: hard
  parallel_processes: 77
  judge_enabled: true
  judge_model: o4-mini
  judge_num_proc: 77
  judge_python: /home/luyadong/.venv/bin/python
  judge_script: /home/luyadong/sandbox/mini-web-agent/om2w_judge/run.py
  logs_root: /home/luyadong/sandbox/mini-web-agent/logs
  final_script_dir: /home/luyadong/sandbox/mini-web-agent/outputs/sandbox/run32_simplest_vx
